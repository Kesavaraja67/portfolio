<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#0C0C0F"/>
  
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFCC" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing border -->
  <rect x="16" y="16" width="480" height="480" rx="112" stroke="url(#textGradient)" stroke-width="8" stroke-opacity="0.3" filter="url(#glow)"/>

  <!-- Text -->
  <text 
    x="50%" 
    y="54%" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="280" 
    font-weight="800"
    letter-spacing="-10"
    fill="url(#textGradient)" 
    dominant-baseline="middle" 
    text-anchor="middle"
    filter="url(#glow)"
  >
    Kr7
  </text>
  
  <!-- Overlay highlight for that glossy/glass effect -->
  <path d="M0 128Q256 300 512 128V0H0V128Z" fill="white" fill-opacity="0.03"/>
</svg>
